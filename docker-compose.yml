services:
  postgres:
    image: pgvector/pgvector:pg15
    environment:
      POSTGRES_USER: chatwoot
      POSTGRES_PASSWORD: chatwoot
      POSTGRES_DB: chatwoot
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7

  chatwoot:
    build:
      context: ./chatwoot
    command: sh -c "rm -f /app/tmp/pids/server.pid && bundle exec rails server -b 0.0.0.0 -p 3000"
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_USERNAME: chatwoot
      POSTGRES_PASSWORD: chatwoot
      POSTGRES_DATABASE: chatwoot
      REDIS_URL: redis://redis:6379
      RAILS_ENV: production
      SECRET_KEY_BASE: ${SECRET_KEY_BASE}
      FRONTEND_URL: https://despair-siberian-unwarlike.ngrok-free.dev
      RAILS_SERVE_STATIC_FILES: "true"
      INSTALLATION_ENV: docker
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_started
      redis:
        condition: service_started

  chatwoot-worker:
    build:
      context: ./chatwoot
    command: bundle exec sidekiq
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_USERNAME: chatwoot
      POSTGRES_PASSWORD: chatwoot
      POSTGRES_DATABASE: chatwoot
      REDIS_URL: redis://redis:6379
      RAILS_ENV: production
      SECRET_KEY_BASE: ${SECRET_KEY_BASE}
      FRONTEND_URL: https://despair-siberian-unwarlike.ngrok-free.dev
      RAILS_SERVE_STATIC_FILES: "true"
      INSTALLATION_ENV: docker
    depends_on:
      - postgres
      - redis

  backend:
    build:
      context: ./backend
    env_file:
      - ./backend/.env
    ports:
      - "5000:5000"
    volumes:
      - ./.cursor:/app/.cursor
    depends_on:
      - postgres

  followup-worker:
    build:
      context: ./backend
    command: python workers/followup_worker.py
    env_file:
      - ./backend/.env
    depends_on:
      - postgres
      - backend

volumes:
  postgres_data:
